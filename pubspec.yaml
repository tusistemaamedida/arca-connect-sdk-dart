version: 0.1.0
license: MIT
homepage: https://arcaconnect.com
repository: https://github.com/tusistemaamedida/arca-connect-sdk-dart
issue_tracker: https://github.com/tusistemaamedida/arca-connect-sdk-dart/issues

environment:
